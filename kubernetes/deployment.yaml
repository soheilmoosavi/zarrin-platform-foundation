apiVersion: apps/v1
kind: Deployment

metadata:
  name: zarrin-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: zarrin-platform

  template:

    metadata:
      labels:
        app: zarrin-platform

    spec:

      containers:

      - name: zarrin-platform

        image: soheilmoosavii/zarrin-platform:v1

        ports:
        - containerPort: 80
